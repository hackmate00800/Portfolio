<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Ankit</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Poppins:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #080012;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(120px);
    }
    .bg-blob-1 { width: 600px; height: 600px; background: rgba(109,40,217,0.12); top: -20%; left: -10%; }
    .bg-blob-2 { width: 500px; height: 500px; background: rgba(76,29,149,0.15); bottom: -20%; right: -10%; }
    .bg-blob-3 { width: 400px; height: 400px; background: rgba(147,51,234,0.08); top: 40%; left: 40%; }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12rem;
      line-height: 1;
      background: linear-gradient(135deg, #a855f7, #d946ef, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      letter-spacing: 4px;
    }
    @media (max-width: 640px) {
      .code { font-size: 7rem; }
    }
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: rgba(168,85,247,0.08);
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 0.5rem;
      color: #f0f0f5;
    }
    @media (max-width: 640px) {
      h1 { font-size: 1.2rem; }
    }
    p {
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      color: #8888a0;
      margin-top: 0.75rem;
      max-width: 400px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      background: linear-gradient(135deg, #9333ea, #d946ef);
      color: #fff;
      box-shadow: 0 0 20px rgba(168,85,247,0.25);
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(168,85,247,0.4);
    }
    .btn-outline {
      display: inline-block;
      margin-top: 2rem;
      margin-left: 0.75rem;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
      transition: all 0.3s ease;
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(168,85,247,0.4);
      color: #fff;
      transform: scale(1.05);
    }
    .dots {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 2rem;
    }
    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(168,85,247,0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.4s; }
    .dots span:nth-child(3) { animation-delay: 0.8s; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.6); opacity: 0.7; }
    }
  </style>
</head>
<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>
  <div class="container">
    <div class="glow"></div>
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div>
      <a href="/" class="btn">Back to Home</a>
      <a href="javascript:history.back()" class="btn-outline">Go Back</a>
    </div>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</body>
</html>
